<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Student Attendance Portal</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <div class="auth-container">
    <div class="glass-card auth-card animate-fade">
      
      <div class="auth-logo">A</div>
      <h1 class="auth-title">Attendance Portal</h1>
      <p class="auth-subtitle">Sign in to manage classes and track attendance</p>

      <div id="alert-box" style="display: none;"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input class="form-input" type="email" id="login-email" required placeholder="name@school.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" type="password" id="login-password" required placeholder="••••••••">
        </div>

        <button class="btn" type="submit" id="submit-btn">
          Sign In
        </button>
      </form>

      <!-- Testing shortcuts helper -->
      <div style="margin-top: 32px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.05); text-align: left;">
        <p style="font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 12px; text-align: center;">Quick Seeding Accounts (Click to Fill)</p>
        <div style="display: grid; grid-template-columns: 1fr; gap: 8px;">
          <button class="btn btn-secondary" style="padding: 8px 12px; font-size: 12px; justify-content: space-between;" onclick="fillCredentials('admin@portal.com', 'admin123')">
            <span>Admin Portal</span>
            <span style="color: var(--accent); font-weight: 700;">admin123</span>
          </button>
          <button class="btn btn-secondary" style="padding: 8px 12px; font-size: 12px; justify-content: space-between;" onclick="fillCredentials('teacher@portal.com', 'teacher123')">
            <span>Teacher Portal</span>
            <span style="color: var(--accent); font-weight: 700;">teacher123</span>
          </button>
          <button class="btn btn-secondary" style="padding: 8px 12px; font-size: 12px; justify-content: space-between;" onclick="fillCredentials('student@portal.com', 'student123')">
            <span>Student Portal</span>
            <span style="color: var(--accent); font-weight: 700;">student123</span>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
