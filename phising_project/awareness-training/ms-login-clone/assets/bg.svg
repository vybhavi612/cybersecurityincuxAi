<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#eef3fb"/>
      <stop offset="45%" stop-color="#f6f1f7"/>
      <stop offset="100%" stop-color="#fdf3ee"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
    <filter id="ribbon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#base)"/>

  <!-- soft colour washes -->
  <g filter="url(#soft)" opacity="0.85">
    <circle cx="280"  cy="220"  r="360" fill="#d7e6fb"/>
    <circle cx="1650" cy="180"  r="420" fill="#fbe2ec"/>
    <circle cx="1750" cy="820"  r="460" fill="#ffe6d6"/>
    <circle cx="220"  cy="900"  r="400" fill="#e4dcf5"/>
    <circle cx="960"  cy="560"  r="520" fill="#f3eefb"/>
  </g>

  <!-- flowing ribbon highlights -->
  <g filter="url(#ribbon)" fill="none" stroke-linecap="round">
    <path d="M -100 250 C 400 60, 900 380, 1350 160 S 2100 80, 2100 80"
          stroke="#cfe0fa" stroke-width="60" opacity="0.55"/>
    <path d="M -100 760 C 500 980, 1000 600, 1500 880 S 2100 760, 2100 760"
          stroke="#ffd8c2" stroke-width="70" opacity="0.45"/>
    <path d="M 600 -100 C 720 300, 1180 360, 1100 760 S 1300 1200, 1300 1200"
          stroke="#f3d2e4" stroke-width="55" opacity="0.4"/>
  </g>
</svg>
